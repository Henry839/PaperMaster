<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="980" rx="48" fill="#08111A"/>
  <rect x="24" y="24" width="1552" height="932" rx="36" fill="url(#bg)" stroke="#CCA866" stroke-opacity="0.18" stroke-width="2"/>

  <text x="86" y="118" fill="#F7F1E5" font-family="SF Pro Display, Arial, sans-serif" font-size="52" font-weight="700">PaperMaster</text>
  <text x="86" y="162" fill="#C9B48C" font-family="SF Pro Text, Arial, sans-serif" font-size="24">Hot Papers discovery and one-click import inside the app</text>

