      <text x="1178" y="40" fill="#F59E0B" font-family="SF Pro Text, Arial, sans-serif" font-size="15" font-weight="700">Rising 78</text>
      <text x="1168" y="74" fill="#9FB1C3" font-family="SF Pro Text, Arial, sans-serif" font-size="13">Published 1d ago</text>

