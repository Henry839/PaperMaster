      <text x="292" y="103" fill="#C9B48C" font-family="SF Pro Text, Arial, sans-serif" font-size="13" font-weight="600">1x library match</text>

      <text x="414" y="90" fill="#D7DEE7" font-family="SF Pro Text, Arial, sans-serif" font-size="14">
