      <text x="22" y="36" fill="#F7F1E5" font-family="SF Pro Text, Arial, sans-serif" font-size="28" font-weight="700">Gradient Routing for Efficient Multimodal Agents</text>
      <text x="22" y="66" fill="#9FB1C3" font-family="SF Pro Text, Arial, sans-serif" font-size="16">M. Patel, Y. Lin, K. Sato</text>

