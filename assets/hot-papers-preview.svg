    <text x="58" y="146" fill="#F7F1E5" font-family="SF Pro Display, Arial, sans-serif" font-size="40" font-weight="700">Hot Papers</text>
    <text x="58" y="182" fill="#C9B48C" font-family="SF Pro Text, Arial, sans-serif" font-size="20">Fresh submissions from the core machine learning feed.</text>

